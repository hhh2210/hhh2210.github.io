{% assign canonical_url = page.url | absolute_url %}
{% assign page_description = page.description | default: page.excerpt | default: site.description | strip_html | normalize_whitespace %}
{% if page.schema == "faq" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "name": {{ page.title | jsonify }},
  "url": {{ canonical_url | jsonify }},
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is Echoes as Anchors?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Echoes as Anchors is an ICLR 2026 paper about LLM reasoning. It studies why large reasoning models often repeat or rephrase the original user question before solving a problem, and whether that behavior helps reasoning."
      }
    },
    {
      "@type": "Question",
      "name": "What is Echo of Prompt?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Echo of Prompt is the behavior where a large reasoning model repeats or rephrases the original user question inside its reasoning trajectory."
      }
    },
    {
      "@type": "Question",
      "name": "What is Echo Likelihood Gap?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Echo Likelihood Gap is a probabilistic measurement used to quantify the cost and likelihood effect of prompt echoes in LLM reasoning."
      }
    },
    {
      "@type": "Question",
      "name": "What is Echoic Prompting?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Echoic Prompting is a training-free inference-time method that reintroduces the original question or a reminder during generation to re-ground reasoning."
      }
    }
  ]
}
</script>
{% elsif page.schema == "scholarly_article" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "ScholarlyArticle",
      "@id": {{ canonical_url | append: "#paper" | jsonify }},
      "headline": {{ page.paper_title | default: page.title | jsonify }},
      "name": {{ page.paper_title | default: page.title | jsonify }},
      "description": {{ page_description | jsonify }},
      "url": {{ canonical_url | jsonify }},
      "datePublished": {{ page.paper_date_published | jsonify }},
      "creativeWorkStatus": {{ page.paper_status | jsonify }},
      "sameAs": [
        {{ page.paper_url | jsonify }},
        {{ page.paper_repo | jsonify }},
        {{ page.paper_context | jsonify }},
        {{ page.paper_metadata_json | jsonify }}
      ],
      "author": [
        {% for author in page.paper_authors %}
        {
          "@type": "Person",
          "name": {{ author | jsonify }}
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ],
      "isPartOf": {
        "@type": "WebSite",
        "name": "Larry Hao",
        "url": "https://hhh2210.github.io/"
      },
      "about": [
        "LLM reasoning",
        "large reasoning models",
        "Echo of Prompt",
        "attention refocusing",
        "echoic prompting",
        "probabilistic analysis",
        "chain-of-thought reasoning"
      ],
      "codeRepository": {{ page.paper_repo | jsonify }}
    },
    {
      "@type": "SoftwareSourceCode",
      "@id": {{ canonical_url | append: "#software" | jsonify }},
      "name": "echoes-as-anchors",
      "description": "Research code for Echoes as Anchors, an ICLR 2026 paper on Echo of Prompt, attention refocusing, and LLM reasoning.",
      "codeRepository": {{ page.paper_repo | jsonify }},
      "programmingLanguage": "Python",
      "license": "https://github.com/hhh2210/echoes-as-anchors/blob/master/LICENSE",
      "isPartOf": {
        "@id": {{ canonical_url | append: "#paper" | jsonify }}
      },
      "keywords": "LLM reasoning, Echo of Prompt, echoic prompting, attention refocusing, probabilistic analysis, chain-of-thought"
    }
  ]
}
</script>
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfilePage",
  "name": "Larry Hao AI Research Profile",
  "url": {{ canonical_url | jsonify }},
  "description": {{ page_description | jsonify }},
  "mainEntity": {
    "@type": "Person",
    "name": "Larry Hao",
    "alternateName": "Zhuoyuan Hao",
    "email": "hzy2210@gmail.com",
    "affiliation": {
      "@type": "CollegeOrUniversity",
      "name": "Harbin Institute of Technology, Shenzhen"
    },
    "sameAs": [
      "https://github.com/hhh2210",
      "https://hhh2210.github.io/",
      "https://github.com/hhh2210/echoes-as-anchors",
      "https://openreview.net/forum?id=vndn1Wrult"
    ],
    "knowsAbout": [
      "LLM reasoning",
      "reinforcement learning",
      "agent systems",
      "Echo of Prompt",
      "attention refocusing",
      "AI developer tools",
      "applied AI products"
    ]
  }
}
</script>
{% endif %}
